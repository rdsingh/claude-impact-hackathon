<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Diego Neighborhood Issue Tracker</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #viewDiv { width: 100%; height: 100vh; }

    #controls {
      position: absolute;
      top: 15px;
      right: 15px;
      background: white;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      z-index: 10;
      width: 260px;
      font-size: 14px;
    }
    #controls h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }
    #controls label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      font-weight: 600;
      color: #555;
    }
    #controls select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    #controls button {
      margin-top: 14px;
      width: 100%;
      padding: 8px;
      background: #0079c1;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    #controls button:hover { background: #005a8c; }
    #granularity-btns {
      display: flex;
      gap: 4px;
    }
    .gran-btn {
      flex: 1;
      margin-top: 0 !important;
      padding: 5px 4px !important;
      font-size: 11px !important;
      background: #e8e8e8 !important;
      color: #555 !important;
      border: 1px solid #ccc !important;
      cursor: pointer;
      border-radius: 4px;
    }
    .gran-btn.active {
      background: #0079c1 !important;
      color: white !important;
      border-color: #0079c1 !important;
    }
    .gran-btn:hover:not(.active) { background: #d0d0d0 !important; }
    #timeSlider {
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      margin-top: 6px;
    }
    #timeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0079c1;
      cursor: pointer;
    }

    #legend {
      position: absolute;
      bottom: 30px;
      right: 15px;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      z-index: 10;
      font-size: 12px;
    }
    #legend h3 { margin-bottom: 8px; font-size: 14px; }
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    .legend-color {
      width: 20px;
      height: 14px;
      margin-right: 8px;
      border: 1px solid #999;
      border-radius: 2px;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95);
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      z-index: 20;
      font-size: 16px;
      display: none;
    }
    #title-bar {
      position: absolute;
      top: 15px;
      left: 15px;
      background: white;
      padding: 12px 18px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      z-index: 10;
    }
    #title-bar h1 {
      font-size: 18px;
      color: #333;
      margin: 0;
    }
    #title-bar p {
      font-size: 12px;
      color: #777;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>

  <div id="title-bar">
    <h1>San Diego Neighborhood Issue Tracker</h1>
    <p>Quality of Life scores (2018-2025)</p>
  </div>

  <div id="controls">
    <h2>Filters</h2>

    <label for="neighborhood">My Neighborhood</label>
    <select id="neighborhood">
      <option value="" selected>All Neighborhoods</option>
    </select>

    <label for="source">Data Source</label>
    <select id="source">
      <option value="all_sources_combined" selected>All Sources</option>
      <option value="311">311 / Get It Done</option>
      <option value="code_enforcement">Code Enforcement</option>
      <option value="police_calls">Police Calls</option>
    </select>

    <label for="category">Category</label>
    <select id="category">
      <option value="all" selected>All</option>
      <option value="critical">Critical</option>
      <option value="non_critical">Non-Critical</option>
    </select>

    <label for="granularity">Time Granularity</label>
    <div id="granularity-btns">
      <button class="gran-btn" data-gran="annually">Annually</button>
      <button class="gran-btn active" data-gran="quarterly">Quarterly</button>
      <button class="gran-btn" data-gran="monthly">Monthly</button>
    </div>

    <label for="timeSlider">Time Period</label>
    <input type="range" id="timeSlider" min="0" max="31" value="24" style="width:100%" />
    <div id="timeLabel" style="text-align:center;font-size:13px;color:#333;margin-top:4px;">2024 Q1</div>

    <button id="playBtn">&#9654; Play</button>
  </div>

  <div id="legend">
    <h3>QoL Score (vs City Avg)</h3>
    <div class="legend-item"><div class="legend-color" style="background:#1a9641"></div> Low (&lt;0.5)</div>
    <div class="legend-item"><div class="legend-color" style="background:#ffffbf"></div> Medium (0.5-1.5)</div>
    <div class="legend-item"><div class="legend-color" style="background:#d7191c"></div> High (&gt;1.5)</div>
    <p style="margin-top:6px;color:#888;font-style:italic;">Higher score = more incidents relative to city average</p>
  </div>

  <div id="loading">Loading data...</div>

  <script>
    const API_BASE = 'http://localhost:8000';

    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GeoJSONLayer",
      "esri/renderers/ClassBreaksRenderer",
      "esri/symbols/SimpleFillSymbol",
      "esri/geometry/Extent"
    ], function(Map, MapView, GeoJSONLayer, ClassBreaksRenderer, SimpleFillSymbol, Extent) {

      const map = new Map({ basemap: "gray-vector" });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-117.16, 32.72],
        zoom: 11
      });

      // Color ramp: green (low issues) → red (high issues)
      function getRenderer() {
        return new ClassBreaksRenderer({
          field: "avg_score",
          defaultSymbol: new SimpleFillSymbol({
            color: [200, 200, 200, 0.5],
            outline: { color: [100, 100, 100, 0.5], width: 0.5 }
          }),
          classBreakInfos: [
            {
              minValue: 0, maxValue: 0.5,
              symbol: new SimpleFillSymbol({
                color: [26, 150, 65, 0.7],
                outline: { color: [255, 255, 255, 0.6], width: 0.5 }
              }),
              label: "Low (< 0.5)"
            },
            {
              minValue: 0.5, maxValue: 1.5,
              symbol: new SimpleFillSymbol({
                color: [255, 255, 191, 0.7],
                outline: { color: [255, 255, 255, 0.6], width: 0.5 }
              }),
              label: "Medium (0.5 - 1.5)"
            },
            {
              minValue: 1.5, maxValue: 100,
              symbol: new SimpleFillSymbol({
                color: [215, 25, 28, 0.7],
                outline: { color: [255, 255, 255, 0.6], width: 0.5 }
              }),
              label: "High (> 1.5)"
            }
          ]
        });
      }

      const popupTemplate = {
        title: "{name}",
        content: [
          {
            type: "text",
            text: "<b>QoL Score:</b> {avg_score}<br/><br/><em>Score relative to city average (1.0 = average)</em>"
          }
        ]
      };

      let currentLayer = null;
      let granularity = 'quarterly';

      // Time steps for each granularity
      const timeSteps = {
        annually: [],
        quarterly: [],
        monthly: []
      };
      for (let y = 2018; y <= 2025; y++) {
        timeSteps.annually.push({ year: y, label: `${y}` });
        for (let q = 1; q <= 4; q++) {
          timeSteps.quarterly.push({ year: y, quarter: q, label: `${y} Q${q}` });
        }
        for (let m = 1; m <= 12; m++) {
          const mName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1];
          timeSteps.monthly.push({ year: y, month: m, label: `${mName} ${y}` });
        }
      }

      function updateSliderRange() {
        const slider = document.getElementById('timeSlider');
        const steps = timeSteps[granularity];
        slider.max = steps.length - 1;
        // Default to latest
        slider.value = steps.length - 1;
        updateTimeLabel();
      }

      function updateTimeLabel() {
        const slider = document.getElementById('timeSlider');
        const steps = timeSteps[granularity];
        const idx = parseInt(slider.value);
        document.getElementById('timeLabel').textContent = steps[idx].label;
      }

      function getTimeParams() {
        const slider = document.getElementById('timeSlider');
        const steps = timeSteps[granularity];
        const step = steps[parseInt(slider.value)];
        return step;
      }

      let playInterval = null;
      let isPlaying = false;

      // Granularity button handlers
      document.querySelectorAll('.gran-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          stopPlayback();
          document.querySelectorAll('.gran-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          granularity = btn.dataset.gran;
          updateSliderRange();
          loadData();
        });
      });

      // Auto-apply on source/category change
      document.getElementById('source').addEventListener('change', () => { stopPlayback(); loadData(); });
      document.getElementById('category').addEventListener('change', () => { stopPlayback(); loadData(); });

      // Slider change handler
      document.getElementById('timeSlider').addEventListener('input', () => {
        updateTimeLabel();
      });
      document.getElementById('timeSlider').addEventListener('change', () => {
        stopPlayback();
        loadData();
      });

      // Play/Pause
      function startPlayback() {
        isPlaying = true;
        const btn = document.getElementById('playBtn');
        btn.innerHTML = '&#9646;&#9646; Pause';
        const slider = document.getElementById('timeSlider');

        // If at the end, loop back to beginning
        if (parseInt(slider.value) >= parseInt(slider.max)) {
          slider.value = 0;
          updateTimeLabel();
          loadData();
        }

        playInterval = setInterval(() => {
          const max = parseInt(slider.max);
          const current = parseInt(slider.value);
          if (current >= max) {
            stopPlayback();
            return;
          }
          slider.value = current + 1;
          updateTimeLabel();
          loadData();
        }, 2000);
      }

      function stopPlayback() {
        if (playInterval) {
          clearInterval(playInterval);
          playInterval = null;
        }
        isPlaying = false;
        document.getElementById('playBtn').innerHTML = '&#9654; Play';
      }

      document.getElementById('playBtn').addEventListener('click', () => {
        if (isPlaying) {
          stopPlayback();
        } else {
          startPlayback();
        }
      });

      async function loadData() {
        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        const source = document.getElementById('source').value;
        const category = document.getElementById('category').value;
        const timeParams = getTimeParams();

        let url = `${API_BASE}/api/geojson?source=${source}&category=${category}`;
        if (timeParams.year) url += `&year=${timeParams.year}`;
        if (timeParams.quarter) url += `&quarter=${timeParams.quarter}`;
        if (timeParams.month) url += `&month=${timeParams.month}`;

        try {
          // Fetch GeoJSON and create a blob URL for GeoJSONLayer
          const resp = await fetch(url);
          const geojson = await resp.json();
          const blob = new Blob([JSON.stringify(geojson)], { type: 'application/json' });
          const blobUrl = URL.createObjectURL(blob);

          // Remove old layer
          if (currentLayer) {
            map.remove(currentLayer);
            URL.revokeObjectURL(currentLayer._blobUrl);
          }

          const layer = new GeoJSONLayer({
            url: blobUrl,
            renderer: getRenderer(),
            popupTemplate: popupTemplate,
            title: "Neighborhood QoL"
          });
          layer._blobUrl = blobUrl;

          map.add(layer);
          currentLayer = layer;

          await layer.when();
          loading.style.display = 'none';
        } catch (err) {
          console.error('Error loading data:', err);
          loading.textContent = 'Error loading data. Is the API server running?';
        }
      }

      // Populate neighborhood dropdown and handle zoom
      let beatsData = null;

      async function loadNeighborhoods() {
        const resp = await fetch(`${API_BASE}/api/beats`);
        beatsData = await resp.json();

        const names = beatsData.features
          .map(f => f.properties.name)
          .filter(n => n && n.trim())
          .sort();
        const unique = [...new Set(names)];

        const select = document.getElementById('neighborhood');
        unique.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });
      }

      document.getElementById('neighborhood').addEventListener('change', () => {
        stopPlayback();
        const name = document.getElementById('neighborhood').value;
        if (!name || !beatsData) {
          // Reset to full San Diego view
          view.goTo({ center: [-117.16, 32.72], zoom: 11 });
          return;
        }
        // Find all matching features and compute combined extent
        const matching = beatsData.features.filter(f => f.properties.name === name);
        if (matching.length === 0) return;

        // Build extent from all matching polygon coordinates
        let xmin = Infinity, ymin = Infinity, xmax = -Infinity, ymax = -Infinity;
        matching.forEach(f => {
          const coords = f.geometry.type === 'MultiPolygon'
            ? f.geometry.coordinates.flat(2)
            : f.geometry.coordinates.flat(1);
          coords.forEach(([x, y]) => {
            if (x < xmin) xmin = x;
            if (x > xmax) xmax = x;
            if (y < ymin) ymin = y;
            if (y > ymax) ymax = y;
          });
        });

        const extent = new Extent({ xmin, ymin, xmax, ymax, spatialReference: { wkid: 4326 } });
        view.goTo(extent.expand(1.3), { duration: 1000 });
      });

      // Initialize
      loadNeighborhoods();
      updateSliderRange();
      loadData();
    });
  </script>
</body>
</html>
